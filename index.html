<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Professional Panel Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root {
        --grid-size: 24px;
      }

      body {
        font-family: "Manrope", "Segoe UI", sans-serif;
      }

      .board-grid {
        background-color: #f8fafc;
        background-image:
          linear-gradient(to right, rgba(148, 163, 184, 0.18) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(148, 163, 184, 0.18) 1px, transparent 1px);
        background-size: var(--grid-size) var(--grid-size);
      }
    </style>
  </head>
  <body class="min-h-screen bg-gradient-to-br from-slate-100 via-slate-50 to-cyan-50 text-slate-900">
    <main class="mx-auto max-w-7xl p-4 sm:p-6 lg:p-8">
      <section class="rounded-2xl border border-slate-200/80 bg-white/90 p-5 shadow-sm backdrop-blur sm:p-6">
        <div class="flex flex-wrap items-center justify-between gap-4">
          <div>
            <h1 class="text-xl font-extrabold tracking-tight sm:text-2xl">Operations Dashboard Builder</h1>
            <p class="mt-1 text-sm text-slate-600">Add square or rectangle panels. Drag, resize, and keep layout collision-free.</p>
          </div>
          <div class="rounded-xl border border-slate-200 bg-slate-50 px-3 py-2 text-xs font-medium text-slate-600">
            Fixed workspace • No panel overlap
          </div>
        </div>

        <div class="mt-5 flex flex-wrap items-center gap-2">
          <button id="addSquareBtn" type="button" class="rounded-lg bg-slate-900 px-4 py-2 text-sm font-semibold text-white transition hover:bg-slate-800">
            Add Square
          </button>
          <button id="addRectangleBtn" type="button" class="rounded-lg bg-cyan-600 px-4 py-2 text-sm font-semibold text-white transition hover:bg-cyan-500">
            Add Rectangle
          </button>
          <button id="removeSelectedBtn" type="button" class="rounded-lg border border-slate-300 bg-white px-4 py-2 text-sm font-semibold text-slate-700 transition hover:bg-slate-50 disabled:cursor-not-allowed disabled:opacity-50">
            Remove Selected
          </button>
          <button id="clearAllBtn" type="button" class="rounded-lg border border-rose-200 bg-rose-50 px-4 py-2 text-sm font-semibold text-rose-700 transition hover:bg-rose-100">
            Clear All
          </button>
          <button id="exportWidgetsBtn" type="button" class="rounded-lg border border-emerald-200 bg-emerald-50 px-4 py-2 text-sm font-semibold text-emerald-700 transition hover:bg-emerald-100">
            Export JSON
          </button>
          <button id="importWidgetsBtn" type="button" class="rounded-lg border border-blue-200 bg-blue-50 px-4 py-2 text-sm font-semibold text-blue-700 transition hover:bg-blue-100">
            Import JSON
          </button>
          <input id="importWidgetsInput" type="file" accept="application/json,.json" class="hidden" />

          <label for="dragStepInput" class="ml-auto inline-flex items-center gap-2 rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm text-slate-700">
            Drag Step
            <input id="dragStepInput" type="number" min="1" max="200" step="1" value="24" class="w-16 rounded border border-slate-300 px-2 py-1 text-right text-sm text-slate-700" />
            <span class="text-xs text-slate-500">px</span>
          </label>

          <label class="inline-flex items-center gap-2 rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm text-slate-700">
            <input id="snapToggle" type="checkbox" class="h-4 w-4 accent-cyan-600" checked />
            Snap to grid
          </label>
        </div>

        <div class="mt-3 flex flex-wrap items-center gap-3 text-xs">
          <span id="selectionMeta" class="rounded-md border border-slate-200 bg-slate-50 px-2.5 py-1.5 font-medium text-slate-700">No panel selected</span>
          <span id="statusBadge" class="rounded-md bg-emerald-50 px-2.5 py-1.5 font-medium text-emerald-700">Ready</span>
        </div>
      </section>

      <section class="mt-5 rounded-2xl border border-slate-200/80 bg-white/90 p-3 shadow-sm backdrop-blur sm:p-4">
        <div
          id="dashboard"
          class="board-grid relative h-[74vh] min-h-[520px] w-full overflow-hidden rounded-xl border border-slate-200"
          aria-label="Panel Dashboard"
        ></div>
      </section>
    </main>

    <script src="js/dashboard-config.js"></script>
    <script src="js/dashboard-helpers.js"></script>
    <script src="js/layout-engine.js"></script>
    <script src="js/panel-element.js"></script>
    <script src="js/panel-dashboard.js"></script>
    <script src="app.js"></script>
  </body>
</html>
